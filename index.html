<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1020">
  <title>Soru Havuzu | Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Instrument+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a href="index.html">Dashboard</a>
      <a href="tekrar.html">Tekrar</a>
      <a href="istatistikler.html">İstatistikler</a>
      <a href="liste.html">Liste</a>
      <a href="ekle.html">Soru Ekle</a>
      <a href="ayarlar.html">Ayarlar</a>
    </nav>

    <section class="panel">
      <header class="page-head">
        <div class="page-head-top">
          <div>
            <h1>Soru Havuzu</h1>
            <p class="small">Offline-first PWA, IndexedDB tabanli yapi.</p>
          </div>
          <div class="page-actions">
            <button id="themeToggle" class="icon-btn" title="Tema değiş">🌙</button>
          </div>
        </div>
      </header>
      <div class="kpi" id="kpi"></div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>Hızlı İstatistikler</h2>
        <a href="istatistikler.html" class="link-btn">Detaylı İstatistikler →</a>
      </div>
      <div class="quick-stats" id="quickStats"></div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>Son Eklenenler</h2>
      </div>
      <div id="recent" class="list"></div>
      <div id="status" class="status info">Yükleniyor...</div>
    </section>
  </div>

  <script type="module">
    import { bootPage, showMessage, escapeHTML, formatDate } from "./common.js";
    import { initDB, getAllQuestions, getDueQuestions } from "./db.js";
    import { statsManager } from "./stats.js";
    import { themeManager } from "./theme.js";
    import { QUESTION_TYPE_LABELS } from "./constants.js";

    const kpi = document.getElementById("kpi");
    const quickStats = document.getElementById("quickStats");
    const recent = document.getElementById("recent");
    const status = document.getElementById("status");
    const themeToggle = document.getElementById("themeToggle");

    function normalizeType(type) {
      return QUESTION_TYPE_LABELS[type] || String(type || "").trim();
    }

    function renderStats(items, dueCount) {
      const total = items.length;
      const favorites = items.filter((q) => q.isFavorite).length;

      kpi.innerHTML = `
        <article class="kpi-item">
          <span>Toplam</span>
          <strong>${total}</strong>
          <span class="kpi-sub">soru</span>
        </article>
        <article class="kpi-item">
          <span>Bugün Tekrar</span>
          <strong>${dueCount}</strong>
          <span class="kpi-sub">bekleyen</span>
        </article>
        <article class="kpi-item">
          <span>Favori</span>
          <strong>${favorites}</strong>
          <span class="kpi-sub">kayıt</span>
        </article>
      `;

      const badgeHost = document.querySelector('a[href="tekrar.html"]');
      if (badgeHost) {
        badgeHost.querySelector(".nav-badge")?.remove();
        if (dueCount > 0) {
          const badge = document.createElement("span");
          badge.className = "nav-badge";
          badge.textContent = dueCount > 99 ? "99+" : String(dueCount);
          badgeHost.appendChild(badge);
        }
      }
    }

    function renderQuickStats(stats) {
      const categoryStats = statsManager.getCategoryStats(stats);
      const topCategories = categoryStats.slice(0, 3);

      quickStats.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Başarı Oranı</div>
            <div class="stat-value">${stats.successRate.toFixed(1)}%</div>
            <div class="stat-bar">
              <div class="stat-fill" style="width: ${stats.successRate}%"></div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Ort. Tekrar</div>
            <div class="stat-value">${stats.averageReviewCount.toFixed(1)}</div>
            <div class="stat-meta">soru başına</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Gecikmiş</div>
            <div class="stat-value" style="color: var(--danger-c);">${stats.overdue}</div>
            <div class="stat-meta">soru</div>
          </div>
        </div>
        <div class="categories-preview">
          <div class="preview-title">En İyisi</div>
          ${topCategories.map(cat => `
            <div class="category-item">
              <span class="cat-name">${escapeHTML(cat.name)}</span>
              <span class="cat-rate">${cat.successRate.toFixed(0)}%</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRecent(items) {
      if (!items.length) {
        recent.innerHTML = "<div class='small'>Kayıt yok.</div>";
        return;
      }

      recent.innerHTML = items
        .sort((a, b) => b.createdAt.localeCompare(a.createdAt))
        .slice(0, 5)
        .map((q) => `
          <article class="question-card compact">
            <div class="card-title">${escapeHTML(q.text.substring(0, 60))}${q.text.length > 60 ? '...' : ''}</div>
            <div class="question-meta small">
              <span class="tag">${escapeHTML(q.category)}</span>
              <span class="tag">${escapeHTML(q.difficulty)}</span>
              <span class="tag">${normalizeType(q.type)}</span>
            </div>
          </article>
        `)
        .join("");
    }

    themeToggle.addEventListener('click', () => {
      const theme = themeManager.toggleTheme();
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    });

    async function init() {
      await bootPage();
      try {
        await initDB();
        const items = await getAllQuestions();
        const due = await getDueQuestions();
        const stats = await statsManager.calculateStats(items);
        
        renderStats(items, due.length);
        renderQuickStats(stats);
        renderRecent(items);
        showMessage(status, "Hazır", "success");
        
        // Tema butonu güncelle
        themeToggle.textContent = themeManager.currentTheme === 'dark' || 
          (themeManager.currentTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) 
          ? '☀️' : '🌙';
      } catch (error) {
        showMessage(status, error.message || "Veri okunamadı.", "error");
      }
    }

    init();
  </script>
</body>
</html>
