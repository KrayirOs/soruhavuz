<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1020">
  <title>Soru Havuzu | Soru Ekle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Instrument+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a href="index.html">Dashboard</a>
      <a href="tekrar.html">Tekrar</a>
      <a href="liste.html">Liste</a>
      <a href="ekle.html">Soru Ekle</a>
      <a href="rastgele.html">Rastgele</a>
      <a href="veri.html">Veri</a>
    </nav>

    <section class="panel">
      <header class="page-head">
        <h1>Yeni Soru</h1>
        <p class="small">Acik uclu veya coktan secmeli soru olustur, kategori ve zorluk bilgisi ekle.</p>
      </header>
      <form id="questionForm" class="grid" novalidate>
        <div class="grid two">
          <div>
            <label for="typeSelect">Tip</label>
            <select name="type" id="typeSelect" required>
              <option value="open-ended">Açık Uçlu</option>
              <option value="multiple-choice">Çoktan Seçmeli</option>
            </select>
          </div>
          <div>
            <label for="difficulty">Zorluk</label>
            <select id="difficulty" required>
              <option value="easy">Kolay</option>
              <option value="medium" selected>Orta</option>
              <option value="hard">Zor</option>
            </select>
          </div>
        </div>

        <div>
          <label for="text">Soru Metni</label>
          <textarea id="text" required></textarea>
        </div>

        <div class="grid two">
          <div>
            <label for="category">Kategori</label>
            <input id="category" list="categoryList" required>
            <datalist id="categoryList"></datalist>
          </div>
          <div>
            <label for="subcategory">Alt Kategori</label>
            <input id="subcategory" list="subcategoryList" required>
            <datalist id="subcategoryList"></datalist>
          </div>
        </div>

        <div id="mcFields" class="panel hidden">
          <h2>Coktan Secmeli Alanlar</h2>
          <div id="optionsWrap" class="grid"></div>
          <div class="actions">
            <button type="button" id="addOption" class="secondary">Secenek Ekle</button>
          </div>
          <div>
            <label for="mcAnswer">Dogru Cevap (or: A, B, C)</label>
            <input id="mcAnswer" type="text" placeholder="Ornek: B">
          </div>
        </div>

        <div id="openFields" class="panel">
          <h2>Acik Uclu Cevap</h2>
          <textarea id="openAnswer" placeholder="Beklenen cevap"></textarea>
        </div>

        <div>
          <label for="image">Gorsel (opsiyonel)</label>
          <div class="actions" style="margin-top:0;">
            <button type="button" id="cameraBtn" class="secondary">📷 Fotoğraf Çek</button>
            <button type="button" id="galleryBtn" class="secondary">🖼 Galeriden Seç</button>
          </div>
          <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">
          <input id="image" type="file" accept="image/*" class="hidden">
          <div id="imageMeta" class="small"></div>
          <img id="preview" class="thumb hidden" alt="Gorsel onizleme">
        </div>

        <div class="row">
          <label><input id="favorite" type="checkbox"> Favori olarak isaretle</label>
        </div>

        <div class="actions">
          <button type="submit" id="submitBtn">Kaydet</button>
          <button type="button" id="draftBtn" class="secondary">Taslak Olarak Kaydet</button>
          <button type="button" id="resetBtn" class="secondary">Temizle</button>
        </div>
      </form>

      <div id="status" class="status info">Hazir</div>
    </section>
  </div>

  <script type="module">
    import { bootPage, showMessage, draft, debounce } from "./common.js";
    import { initDB, createQuestion, getHierarchy } from "./db.js";
    import { compressImage } from "./image-utils.js";
    import { trackEvent } from "./analytics.js";

    const form = document.getElementById("questionForm");
    const typeEl = document.getElementById("typeSelect");
    const difficultyEl = document.getElementById("difficulty");
    const textEl = document.getElementById("text");
    const categoryEl = document.getElementById("category");
    const subcategoryEl = document.getElementById("subcategory");
    const categoryList = document.getElementById("categoryList");
    const subcategoryList = document.getElementById("subcategoryList");
    const mcFields = document.getElementById("mcFields");
    const openFields = document.getElementById("openFields");
    const optionsWrap = document.getElementById("optionsWrap");
    const addOptionBtn = document.getElementById("addOption");
    const mcAnswerEl = document.getElementById("mcAnswer");
    const openAnswerEl = document.getElementById("openAnswer");
    const imageEl = document.getElementById("image");
    const cameraInput = document.getElementById("cameraInput");
    const cameraBtn = document.getElementById("cameraBtn");
    const galleryBtn = document.getElementById("galleryBtn");
    const imageMeta = document.getElementById("imageMeta");
    const preview = document.getElementById("preview");
    const favoriteEl = document.getElementById("favorite");
    const statusEl = document.getElementById("status");
    const resetBtn = document.getElementById("resetBtn");
    const draftBtn = document.getElementById("draftBtn");
    const submitBtn = document.getElementById("submitBtn");

    const MAX_OPTIONS = 8;
    const AUTO_SAVE_INTERVAL = 30000; // 30 saniye
    let selectedImage = null;
    let previewObjectUrl = "";
    let autoSaveTimer;

    function isMultipleChoiceType(type) {
      return type === "multiple-choice";
    }

    function optionInputHtml(index, value = "") {
      return `
        <div class="row">
          <input type="text" data-option-index="${index}" value="${value}" placeholder="Secenek ${index + 1}">
          <button type="button" data-remove-index="${index}" class="warn">Sil</button>
        </div>
      `;
    }

    function getOptionValues() {
      return Array.from(optionsWrap.querySelectorAll("input[data-option-index]"))
        .map((el) => el.value.trim())
        .filter(Boolean);
    }

    function renderOptions(initialCount = 0) {
      const count = Math.min(MAX_OPTIONS, Math.max(0, initialCount));
      optionsWrap.innerHTML = "";
      for (let i = 0; i < count; i += 1) {
        optionsWrap.insertAdjacentHTML("beforeend", optionInputHtml(i));
      }
    }

    function toggleTypeFields() {
      const type = typeEl.value;
      const mc = isMultipleChoiceType(type);
      mcFields.classList.toggle("hidden", !mc);
      openFields.classList.toggle("hidden", mc);
    }

    async function loadHierarchy() {
      const hierarchy = await getHierarchy();
      const categories = hierarchy.map((h) => h.category);
      categoryList.innerHTML = categories.map((c) => `<option value="${c}"></option>`).join("");

      const selected = categoryEl.value.trim();
      const row = hierarchy.find((h) => h.category === selected);
      const subs = row ? row.subcategories : [];
      subcategoryList.innerHTML = subs.map((s) => `<option value="${s}"></option>`).join("");
    }

    function clearPreviewUrl() {
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = "";
      }
    }

    async function handleImagePreview(file) {
      clearPreviewUrl();

      if (!file) {
        selectedImage = null;
        preview.classList.add("hidden");
        preview.removeAttribute("src");
        imageMeta.textContent = "";
        return;
      }

      const { blob, meta } = await compressImage(file, { maxWidth: 1280, maxHeight: 1280, quality: 0.7 });
      selectedImage = {
        blob,
        mimeType: meta.mimeType,
        width: meta.width,
        height: meta.height,
        size: blob.size
      };

      previewObjectUrl = URL.createObjectURL(blob);
      preview.src = previewObjectUrl;
      preview.classList.remove("hidden");
      const savedPct = meta.compressionPercent || 0;
      imageMeta.textContent = `Orijinal: ${Math.round(meta.originalSize / 1024)}KB -> Sikistirilmis: ${Math.round(meta.compressedSize / 1024)}KB (%${savedPct} kucultme)`;
    }

    function captureFormState() {
      return {
        type: typeEl.value,
        text: textEl.value,
        category: categoryEl.value,
        subcategory: subcategoryEl.value,
        difficulty: difficultyEl.value,
        options: getOptionValues(),
        answer: isMultipleChoiceType(typeEl.value) ? mcAnswerEl.value : openAnswerEl.value,
        favorite: favoriteEl.checked
      };
    }

    function enableAutoSave() {
      autoSaveTimer = setInterval(() => {
        const state = captureFormState();
        if (state.text.trim()) {
          draft.save("question", state);
          console.log("📝 Taslak otomatik kaydedildi");
        }
      }, AUTO_SAVE_INTERVAL);
    }

    function disableAutoSave() {
      if (autoSaveTimer) clearInterval(autoSaveTimer);
    }

    function recoverDraft() {
      const savedDraft = draft.load("question");
      if (savedDraft && savedDraft.text.trim()) {
        typeEl.value = savedDraft.type;
        textEl.value = savedDraft.text;
        categoryEl.value = savedDraft.category;
        subcategoryEl.value = savedDraft.subcategory;
        difficultyEl.value = savedDraft.difficulty;
        favoriteEl.checked = savedDraft.favorite;

        if (savedDraft.options.length > 0) {
          renderOptions(savedDraft.options.length);
          optionsWrap.querySelectorAll("input[data-option-index]").forEach((el, i) => {
            el.value = savedDraft.options[i];
          });
        }

        toggleTypeFields();
        showMessage(statusEl, "📋 Önceki taslak geri yüklendi", "success");
        trackEvent("draft_recovered");
      }
    }

    function buildPayload(type) {
      const payload = {
        type,
        text: textEl.value.trim(),
        category: categoryEl.value.trim(),
        subcategory: subcategoryEl.value.trim(),
        difficulty: difficultyEl.value,
        isFavorite: favoriteEl.checked,
        image: selectedImage || null
      };

      if (isMultipleChoiceType(type)) {
        payload.options = getOptionValues();
        payload.answer = mcAnswerEl.value.trim();
      } else {
        payload.options = [];
        payload.answer = openAnswerEl.value.trim();
      }

      return payload;
    }

    function resetForm() {
      clearPreviewUrl();
      selectedImage = null;
      form.reset();
      renderOptions(0);
      toggleTypeFields();
      preview.classList.add("hidden");
      preview.removeAttribute("src");
      imageMeta.textContent = "";
      draft.remove("question");
      showMessage(statusEl, "🗑️ Form temizlendi", "info");
      trackEvent("form_reset");
    }

    async function init() {
      await bootPage();
      await initDB();
      renderOptions(0);
      toggleTypeFields();
      await loadHierarchy();
      recoverDraft();
      enableAutoSave();
      showMessage(statusEl, "✅ Kayda hazir", "success");
      trackEvent("page_load", { page: "ekle" });
    }

    typeEl.addEventListener("change", toggleTypeFields);

    categoryEl.addEventListener("input", debounce(async () => {
      await loadHierarchy();
    }, 300));

    optionsWrap.addEventListener("click", (event) => {
      const btn = event.target.closest("button[data-remove-index]");
      if (!btn) return;
      btn.closest(".row")?.remove();

      const inputs = optionsWrap.querySelectorAll("input[data-option-index]");
      inputs.forEach((input, i) => {
        input.dataset.optionIndex = String(i);
        input.placeholder = `Secenek ${i + 1}`;
      });

      const removeButtons = optionsWrap.querySelectorAll("button[data-remove-index]");
      removeButtons.forEach((button, i) => {
        button.dataset.removeIndex = String(i);
      });
    });

    addOptionBtn.addEventListener("click", () => {
      const current = optionsWrap.querySelectorAll("input[data-option-index]").length;
      if (current >= MAX_OPTIONS) {
        showMessage(statusEl, "⚠️ Maksimum 8 secenek eklenebilir", "error");
        return;
      }
      optionsWrap.insertAdjacentHTML("beforeend", optionInputHtml(current));
    });

    cameraBtn.addEventListener("click", () => cameraInput.click());
    galleryBtn.addEventListener("click", () => imageEl.click());

    async function onImageSelected(file) {
      try {
        await handleImagePreview(file || null);
        trackEvent("image_selected");
      } catch (error) {
        showMessage(statusEl, error.message || "🖼️ Gorsel okunamadi", "error");
        trackEvent("image_error", { error: error.message });
      }
    }

    imageEl.addEventListener("change", () => onImageSelected(imageEl.files?.[0]));
    cameraInput.addEventListener("change", () => onImageSelected(cameraInput.files?.[0]));

    resetBtn.addEventListener("click", resetForm);

    draftBtn.addEventListener("click", () => {
      const state = captureFormState();
      draft.save("question", state);
      showMessage(statusEl, "✔️ Taslak kaydedildi", "success");
      trackEvent("draft_saved");
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      showMessage(statusEl, "⏳ Kaydediliyor...", "info");

      try {
        const type = document.querySelector("#typeSelect").value;
        const payload = buildPayload(type);
        const created = await createQuestion(payload);
        showMessage(statusEl, `✅ Kayit tamamlandi. ID: ${created.id}`, "success");
        trackEvent("question_created", { id: created.id, type });

        resetForm();
        await loadHierarchy();
      } catch (error) {
        showMessage(statusEl, error.message || "❌ Kayit basarisiz", "error");
        trackEvent("question_error", { error: error.message });
      }
    });

    init().catch((error) => {
      showMessage(statusEl, error.message || "❌ Sayfa baslatilamadi", "error");
    });

    window.addEventListener("beforeunload", () => {
      clearPreviewUrl();
      disableAutoSave();
    });
  </script>
</body>
</html>
